  ## qingxujieduanlianghuazhibiao

  ### diyibu：huanshoulvfenxi（qingxureduhexinzhibiao）
  shiyong `get_daily_history` he `get_realtime_quote`：

  - **huanshoulv < 0.5%/ri**：shichanglengdan，wurenguanzhu，qianzaidibuquyu（tanlanshimairubierendekonghuang）。
  - **huanshoulv 0.5%~2%**：zhengchangjiaotou，qingxupingwen。
  - **huanshoulv 2%~5%**：huoyue，shichangkaishiguanzhu，buyizhuigao。
  - **huanshoulv > 5%**：gaoredu，youzi/sanhuyongru，jingtiqingxuding。
  - **huanshoulv > 10%（rijun）**：jiduguore，tongchangweiduanqidingbu。

  ### dierbu：lianxuhuanshoulvzoushi
  shiyong `get_daily_history` jisuanjin 20 rihuanshoulvzoushi：
  - yougaoxiangdi（chixujiangwen）+ chengjiaoliangweisuo → qingxutuichao，naixindengdai。
  - youdixianggao（jiasushengwen）+ chengjiaoliangdouzeng → qingxuqidong，kejieru。
  - turandanribaoliang（huanshoulvchaoguoqianqi5bei）→ wangwangshizhulichuhuo，xujingti。

  ### disanbu：xinwenqingxumianfenxi
  shiyong `search_stock_news` sousuojinqixinwen，fenxiqingxuqingxiang：
  - xinwenjizhongchuxian"lihaoduixian、yejichaoyuqi、zhangtingban、jigoutuijian"deng → qingxukenengguore。
  - xinwenjizhongchuxian"yejixiahua、likong、diepozhicheng" → beiguanqingxukenengzaojiudibu。
  - sanhuluntan/shejiaomeitiqingxujiduanfumian → fanxiangzhibiao，kenengjiejindibu。

  ### disibu：junxianshousuoyubodonglv
  shiyong `analyze_trend`：
  - MA5/MA10/MA20 sanxianzhanhe（junxianshousuo）→ xushi，fangxiangdaiding，qingxulengdan。
  - bodonglvjiangzhidiwei（ATR weisuo）→ qingxujidudimi，xushibaofaqianzhao。

