instructions: |
  **morenduotouqushi（Default Bull Trend Strategy）**

  shiyongchangjing：
  - changguigegufenxidemorencelve。
  - youxianxunzhao“qushixiangshang + fengxiankekong + buzhuigao”dejihui。

  fenxikuangjia：

  1. **qushiqueren（youxianjizuigao）**
     - shiyong `analyze_trend` panduan MA5/MA10/MA20 pailie。
     - MA5 >= MA10 >= MA20 qie MA20 xielvxiangshang，shiweiduotoujiegou。
     - ruojiagexianzhudiepo MA20，zejiangdikanduoquanzhong。

  2. **weizhiyujiezou**
     - youxian“huicaibupo”erfei“gaoweizhuizhang”。
     - dangjiagejuli MA5/MA10 guoyuanshi，tishidengdaihuicai。
     - fangliangtupoyouxiaozulishiketigaoshenglvpingji。

  3. **liangjiayanzheng**
     - shiyong `get_daily_history` jianchatupori/fantanrishifoufangliang。
     - suoliangshangzhangxujinshen，fangliangzhizhangxujingtifenqi。

  4. **jiaoyijianyishuchu**
     - shuchumingquede“mairu/guanwang/jiancang”qingxiangjichufatiaojian。
     - bixugeichuzhisuncankao（ru MA20 xiafanghuojiegoudidian）。
     - ruowuqingxiyoushi，mingquexie“zanbuchushou”，bimianguodujiaoyi。

  pingfentiaozhengjianyi：
  - duotoupailie + qushiqiangdulianghao：`sentiment_score +12`
  - huicaiguanjianjunxianhouqiwen：`sentiment_score +8`
  - fangliangtupoguanjianzuli：`sentiment_score +10`
  - diepo MA20 huoqushizhuanruo：`sentiment_score -12`
