# ── A股全流程自动化交易系统 配置文件 ──

# 基础设置
system:
  name: "Stock Workflow"
  version: "1.0.0"
  dry_run: false          # 模拟模式（不下单不推送）
  log_level: "INFO"

# 数据源配置
data:
  # 优先级: mootdx > 腾讯 > 东财
  mootdx:
    hosts:
      - "110.41.147.114:7709"
      - "110.41.2.72:7709"
  tencent:
    enabled: true
  eastmoney:
    enabled: true
    min_interval: 1.2      # 请求最小间隔(秒) — 防封
    max_retries: 3
  # 历史K线天数
  history_days: 250

# 选股参数
screening:
  # 粗筛
  coarse:
    min_pe: 0              # 排除负PE
    max_pe: 200
    min_mcap: 20           # 最小市值(亿)
    max_mcap: 1000         # 最大市值(亿)
    min_turnover: 1.0      # 最小换手率(%)
    min_vol_ratio: 0.8     # 最小量比
    exclude_st: true       # 排除ST
    min_listed_days: 100   # 上市≥100天
  # 精筛(均线+筹码)
  fine:
    ma_filters: [5, 10, 20, 60]   # 均线周期
    require_ma_above: [20, 60]    # 价格须在MA之上
    volume_surge_ratio: 1.5       # 放量倍数(相对20日均量)
  # 集合竞价承接力
  auction:
    top_n: 5               # 取承接力前N只
    cc_threshold: 2.0      # CC>=2.0才算有承接

# 战法配置
strategies:
  first_board:
    enabled: true
    lookback_days: 60      # 回溯涨停天数
    consolidation_days: 5  # 横盘整理天数
    breakout_vol_ratio: 2.0
  pullback:
    enabled: true
    pullback_ratio: 0.382  # 回踩黄金分割位
    vol_shrink_ratio: 0.5  # 缩量至涨停量50%以下
  wave_point:
    enabled: true
    atr_period: 14
    wave_pct: 3.0          # 波段幅度%
  test_line:
    enabled: true
    line_tolerance: 0.02   # 影线容差2%

# 仓位管理
position:
  max_positions: 5         # 最多持仓5只
  risk_per_trade: 0.01     # 单笔风险1%
  capital: 1000000         # 总资金(元)
  position_weights:
    strong: 0.30           # 强信号仓位
    normal: 0.20           # 普通信号仓位
    weak: 0.10             # 弱信号仓位

# 止损止盈
risk:
  stop_loss:
    support_below_pct: 3.0   # 支撑下方3%
    price_atr_mult: 2.0      # ATR倍数止损
    max_loss_pct: 5.0        # 硬止损5%
  take_profit:
    rr_ratio: 2.0            # 盈亏比2:1
    trailing:
      profit_5pct: "cost"    # +5%→成本价
      profit_10pct: "5pct"   # +10%→+5%位
      profit_20pct: "10pct"  # +20%→+10%位

# 监控
monitor:
  interval: 30               # 轮询间隔(秒)
  trading_hours:
    morning_start: "09:30"
    morning_end: "11:30"
    afternoon_start: "13:00"
    afternoon_end: "15:00"
  alerts:
    stop_loss: true
    take_profit: true
    breakout: true           # 破位预警
    volume_surge: true

# 推送
notify:
  # Server酱 Turbo
  sct_token: "SCT363204TpHVA8URZu9qAL3syyy12DjE3"
  # 企业微信
  wechat_webhook: ""
  # 钉钉
  dingtalk_webhook: ""

# 回测
backtest:
  start_date: "2023-01-01"
  end_date: "2026-06-01"
  initial_capital: 1000000
  commission: 0.0003          # 佣金0.03%
  slippage: 0.001             # 滑点0.1%
  benchmark: "000300"         # 沪深300基准

# 复盘
review:
  dimensions: [选股准确率, 战法胜率, 盈亏比, 最大回撤, 仓位管理]
  weekly_report: true
  monthly_report: true
