# ===================================
# Aguzixuanguzhinengfenxixitong - Docker Compose
# ===================================
# 
# shiyongfangshi:
#   dingshimoshi: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPImoshi: docker-compose -f ./docker/docker-compose.yml up -d server
#   tongshiqidong: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # huanjingbianliang（cong .env wenjianjiazai）
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../strategies:/app/strategies:ro
    # ruxufugaiqianduanjingtaiziyuan，keguazaibendi static mulu
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT cong .env wenjianduqu，wuxuzaiciyingbianma

    # dailishezhi（ruguoxuyao）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # ziyuanxianzhi
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # dingshirenwumoshi
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI moshi
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # ruoshiyong network_mode: host，zeyixia ports yingshewuxiao，duankouyou command zhongde --port zhiding
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
