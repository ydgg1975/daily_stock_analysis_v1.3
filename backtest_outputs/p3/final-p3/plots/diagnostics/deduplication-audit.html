<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deduplication Audit</title>
  <style>
    body {
      margin: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #e8edf7;
    }
    .card {
      background: #121933;
      border: 1px solid #273159;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    h1, h2, h3 { margin: 0 0 12px 0; }
    p, li { color: #b7c1de; }
    svg { width: 100%; height: auto; display: block; }
    .axis { stroke: #7081b9; stroke-width: 1; }
    .grid { stroke: #253052; stroke-width: 1; opacity: 0.8; }
    .label { fill: #b7c1de; font-size: 12px; }
    .series-label { fill: #e8edf7; font-size: 12px; }
    .bar { fill: #2a9d8f; }
    .line-a { stroke: #4cc9f0; fill: none; stroke-width: 2; }
    .line-b { stroke: #f72585; fill: none; stroke-width: 2; }
    .line-c { stroke: #f4a261; fill: none; stroke-width: 2; }
    .line-d { stroke: #90be6d; fill: none; stroke-width: 2; }
    .dot { fill: #f4a261; opacity: 0.85; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      font-size: 13px;
    }
    th, td {
      border: 1px solid #273159;
      padding: 8px;
      text-align: left;
    }
    th { background: #192445; }
  </style>
</head>
<body>
  
        <div class="card">
          <h1>Deduplication Audit</h1>
          <p>How many runs existed per business key before deduplication.</p>
          <svg viewBox="0 0 960 420">
            <line class="axis" x1="56" y1="364" x2="904" y2="364" />
            <line class="axis" x1="56" y1="56" x2="56" y2="364" />
            <rect class="bar" x="62.00" y="198.00" width="836.00" height="166.00" />
            <text class="label" x="62.00" y="386">2</text>
          </svg>
        </div>
        
</body>
</html>
