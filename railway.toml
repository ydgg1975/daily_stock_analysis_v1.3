# ===================================
# Railway 部署配置
# ===================================
# 官方文档: https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile"

[deploy]
# 使用 Web 服务模式启动（不含定时任务，通过 Web 界面触发分析）
# Railway 会自动注入 PORT 环境变量
startCommand = "python main.py --serve-only --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
