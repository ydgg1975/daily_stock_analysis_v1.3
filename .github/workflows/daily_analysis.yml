name: 每日台股股票分析

on:
  # 台北時間 早上 08:00 執行（週一至週五）
  schedule:
    - cron: '0 0 * * 1-5'
    # 每週日自動保活，避免 GitHub 60 天停用
    - cron: '0 1 * * 0'

  # 手動觸發
  workflow_dispatch:
    inputs:
      執行模式:
        description: '選擇執行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（個股+大盤）
          - market-only   # 僅大盤分析
          - stocks-only   # 僅個股分析
      強制執行:
        description: '強制執行（略過交易日檢查）'
        required: false
        default: false
        type: boolean

# 併行控制
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  台股分析作業:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 給予 Git 推送權限（保活用）
    permissions:
      contents: write

    steps:
      - name: 隨機延遲避免限流
        run: sleep $((RANDOM % 60))

      - name: 下載程式碼
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 設定 Python 3.11 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 建立資料夾
        run: |
          mkdir -p data logs reports

      - name: 載入所有金鑰與環境變數
        env:
          # AI 模型
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # 搜尋服務
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}

          # 資料來源
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TWSE_TOKEN: ${{ secrets.TWSE_TOKEN }}

          # 通知服務
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

          # Gmail 郵件發送
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || secrets.SMTP_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD || secrets.SMTP_PASS }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 465

          # 報表與系統
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: zh-TW
          TRADING_DAY_CHECK_ENABLED: true
          LOG_LEVEL: INFO

        run: |
          # 寫入 LiteLLM 設定
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
          fi

          # 判斷手動 / 自動執行
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.執行模式 }}"
            FORCE_ARG="${{ github.event.inputs.強制執行 == 'true' && '--force-run' || '' }}"
          else
            MODE="full"
            FORCE_ARG=""
          fi

          echo "=========================================="
          echo "📈 每日台股股票分析（自動化作業）"
          echo "=========================================="
          echo "執行模式：$MODE"
          echo "報表語系：繁體中文"
          echo "=========================================="

          # 執行主程式
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_ARG
          else
            python main.py $FORCE_ARG
          fi

      - name: 每週自動保活｜防止60天停用
        if: github.event.schedule == '0 1 * * 0'
        run: |
          git config --global user.name "GitHub 自動機器人"
          git config --global user.email "actions@github.com"
          git add .
          git commit --allow-empty -m "每週自動保活 ✅ 維持 Actions 正常執行"
          git push

      - name: 上傳分析報告與日誌
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: 台股分析報告-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 顯示執行結果
        if: always()
        run: |
          echo "=========================================="
          echo "✅ 台股分析執行完畢"
          echo "=========================================="
          ls -la reports/ 2>/dev/null || echo "無報告產生"
          tail -30 logs/*.log 2>/dev/null || echo "無日誌記錄"
