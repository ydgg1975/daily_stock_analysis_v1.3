name: 每日股票分析

on:
  # 定时触发 - 每天北京时间 09:00 和 14:00
  schedule:
    - cron: '0 1 * * 1-5'      # 早9点（UTC 1:00 = 北京时间 09:00）
    - cron: '0 6 * * 1-5'      # 14点（UTC 6:00 = 北京时间 14:00）
  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST || '603993,000725,000630' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          MAX_WORDS_PER_STOCK: 100
          MARKET_REVIEW_ENABLED: false
        run: python main.py
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30
