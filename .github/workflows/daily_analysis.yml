name: 每日股票分析

on:
  # 早盘判断 - 每天北京时间 9:00 (UTC 1:00)
  schedule:
    - cron: '0 1 * * 1-5'  # 周一到周五，UTC 1:00 = 北京时间 9:00
  # 尾盘判断 - 每天北京时间 14:00 (UTC 6:00)
    - cron: '0 6 * * 1-5'  # 周一到周五，UTC 6:00 = 北京时间 14:00
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning  # 早盘判断
          - afternoon  # 尾盘判断

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 判断运行模式
        id: mode
        run: |
          # 根据触发时间判断模式
          HOUR=$(date -u +%H)
          if [ "${{ github.event.inputs.mode }}" = "afternoon" ] || [ "$HOUR" -eq "6" ]; then
            echo "mode=afternoon" >> $GITHUB_OUTPUT
            echo "⏰ 尾盘判断模式"
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
            echo "⏰ 早盘判断模式"
          fi
      
      - name: 运行早盘分析
        if: steps.mode.outputs.mode == 'morning'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          STOCK_LIST: '603993,000725,000630'  # 洛阳钼业、京东方A、铜陵有色
          MAX_WORDS: '100'  # 每只股票100字以内
          ANALYSIS_TYPE: 'morning'  # 早盘：获取前一天信息，给出今日判断
        run: |
          python -m src.analyze_stocks --mode morning
      
      - name: 运行尾盘分析
        if: steps.mode.outputs.mode == 'afternoon'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          STOCK_LIST: '603993,000725,000630'  # 洛阳钼业、京东方A、铜陵有色
          MAX_WORDS: '100'  # 每只股票100字以内
          ANALYSIS_TYPE: 'afternoon'  # 尾盘：获取当天信息，给出尾盘判断
        run: |
          python -m src.analyze_stocks --mode afternoon
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: reports/
          retention-days: 7
