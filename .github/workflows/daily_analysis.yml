name: Daily US Stock Analysis

on:
  # Tuesday-Saturday at 00:00 UTC = 08:00 MYT, covering the prior US trading session post-close.
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run (skip trading-day checks)"
        required: false
        default: false
        type: boolean

concurrency:
  group: us-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime directories
        run: |
          mkdir -p data logs reports

      - name: Run analysis
        env:
          # Gemini only
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.0-flash' }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL || 'gemini/gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: "3.0"

          # Optional search
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Google Sheets portfolio
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ vars.GOOGLE_SHEET_TAB || 'Portfolio' }}

          # Tier configuration
          TIER1_STOCKS: ${{ secrets.TIER1_STOCKS }}
          TIER2_STOCKS: ${{ secrets.TIER2_STOCKS }}
          MONTHLY_DEPOSIT_DATE: ${{ vars.MONTHLY_DEPOSIT_DATE || secrets.MONTHLY_DEPOSIT_DATE || '1' }}

          # US-only behavior
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'AAPL,MSFT,NVDA' }}
          MARKET_REVIEW_REGION: "us"
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          # Runtime
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TIMEZONE: ${{ vars.TIMEZONE || secrets.TIMEZONE || 'Asia/Kuala_Lumpur' }}
          SCHEDULE_TIME: ${{ vars.SCHEDULE_TIME || secrets.SCHEDULE_TIME || '08:00' }}
          POST_MARKET_DELAY: ${{ vars.POST_MARKET_DELAY || secrets.POST_MARKET_DELAY || '0' }}
          HISTORICAL_LOOKBACK_DAYS: ${{ vars.HISTORICAL_LOOKBACK_DAYS || secrets.HISTORICAL_LOOKBACK_DAYS || '252' }}
          NEWS_MAX_AGE_DAYS: ${{ vars.NEWS_MAX_AGE_DAYS || secrets.NEWS_MAX_AGE_DAYS || '7' }}
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: "false"

        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          echo "Stock list=$STOCK_LIST"
          echo "Market review region=$MARKET_REVIEW_REGION"
          echo "Gemini configured=$([ -n "$GEMINI_API_KEY" ] && echo yes || echo no)"

          python main.py $FORCE_RUN_ARG

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Show result summary
        if: always()
        run: |
          echo "Analysis completed."
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            ls -la reports/
          else
            echo "No report files generated."
          fi
