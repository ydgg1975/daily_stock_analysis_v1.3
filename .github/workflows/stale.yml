# zidongguanbiguoqide Issues he PR
# meitianjianchayici，biaojizhangshijianwuxiangyingde issues/PRs

name: Stale Issues & PRs

on:
  schedule:
    # meitian UTC 0:00（beijingshijian 8:00）jianchayici
    - cron: '0 0 * * *'
  # zhichishoudongchufa
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 qingliguoqi Issues/PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏷️ biaojibingguanbiguoqineirong
        uses: actions/stale@v10
        with:
          # ===== Issue peizhi =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 zhege Issue yijing **7 tian** meiyouhuodongle。
            
            ruguowentirengrancunzai，qinghuifushuomingzuixinqingkuang，womenhuijixugenjin。
            ruguowentiyijiejuehuobuzaixuyao，keyizhijieguanbici Issue。
            
            **ruguo 7 tianneimeiyouhuifu，ci Issue jiangzidongguanbi。**
          close-issue-message: |
            🔒 youyuzhangshijianmeiyouhuodong，ci Issue yizidongguanbi。
            
            ruguowentirengrancunzai，huanyingchongxindakaihuochuangjianxinde Issue。
          
          # ===== PR peizhi =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 zhege PR yijing **21 tian** meiyouhuodongle。
            
            qingjianchashifouxuyao：
            - jiejuehebingchongtu
            - huifu review yijian
            - gengxindaima
            
            **ruguo 14 tianneimeiyougengxin，ci PR jiangzidongguanbi。**
          close-pr-message: |
            🔒 youyuzhangshijianmeiyouhuodong，ci PR yizidongguanbi。
            
            ruguoninrengxiwangheruzhexiegenggai，qingchongxindakaihuochuangjianxinde PR。
          
          # ===== paichuguize =====
          # daiyouzhexiebiaoqiandebuhuibeibiaojiwei stale
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # paichucaogao PR
          exempt-draft-pr: true
          
          # ===== qitapeizhi =====
          # meiciyunxingzuiduochulideshuliang
          operations-per-run: 50
          
          # zhichulizhexiezhuangtaide
          only-labels: ''
          
          # yichu stale biaoqian（dangyouxinhuodongshi）
          remove-stale-when-updated: true
          
          # tiaoshimoshi（shewei true shizhidayinbushijicaozuo）
          debug-only: false
