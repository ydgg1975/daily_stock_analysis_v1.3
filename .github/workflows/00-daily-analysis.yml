          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}



          # fangshishiyi：Serverjiang3

          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}



          # fangshishier：Slack

          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}



          # Configuration

          NOTIFICATION_REPORT_CHANNELS: ${{ vars.NOTIFICATION_REPORT_CHANNELS || secrets.NOTIFICATION_REPORT_CHANNELS }}

          NOTIFICATION_ALERT_CHANNELS: ${{ vars.NOTIFICATION_ALERT_CHANNELS || secrets.NOTIFICATION_ALERT_CHANNELS }}

          NOTIFICATION_SYSTEM_ERROR_CHANNELS: ${{ vars.NOTIFICATION_SYSTEM_ERROR_CHANNELS || secrets.NOTIFICATION_SYSTEM_ERROR_CHANNELS }}

          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ vars.NOTIFICATION_DEDUP_TTL_SECONDS || secrets.NOTIFICATION_DEDUP_TTL_SECONDS || '0' }}

          NOTIFICATION_COOLDOWN_SECONDS: ${{ vars.NOTIFICATION_COOLDOWN_SECONDS || secrets.NOTIFICATION_COOLDOWN_SECONDS || '0' }}

          NOTIFICATION_QUIET_HOURS: ${{ vars.NOTIFICATION_QUIET_HOURS || secrets.NOTIFICATION_QUIET_HOURS }}

          NOTIFICATION_TIMEZONE: ${{ vars.NOTIFICATION_TIMEZONE || secrets.NOTIFICATION_TIMEZONE }}

          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY || secrets.NOTIFICATION_MIN_SEVERITY }}

          NOTIFICATION_DAILY_DIGEST_ENABLED: ${{ vars.NOTIFICATION_DAILY_DIGEST_ENABLED || secrets.NOTIFICATION_DAILY_DIGEST_ENABLED || 'false' }}



          # ==========================================

          # watchlist configuration

          # ==========================================

          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}

          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}

          MARKET_REVIEW_COLOR_SCHEME: ${{ vars.MARKET_REVIEW_COLOR_SCHEME || secrets.MARKET_REVIEW_COLOR_SCHEME || 'green_up' }}



          # ==========================================

          # Configuration

          # ==========================================

          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}

          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || '' }}

          REPORT_SHOW_LLM_MODEL: ${{ vars.REPORT_SHOW_LLM_MODEL || secrets.REPORT_SHOW_LLM_MODEL || 'true' }}

          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}

          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}

          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}

          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}



          # ==========================================

          # system configuration

          # ==========================================

          LOG_LEVEL: INFO

          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}

          # Configuration

          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}

          # Configuration

          # kexuanzhi: tencent, akshare_sina, efinance, akshare_em, tushare

          # ruguoyou Tushare Pro gaojifenzhanghao，kejiang tushare fangzaishouwei

          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}



        run: |

          # handle LITELLM YAML config file

          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then

            echo "📝 using LITELLM_CONFIG_YAML from GitHub Actions secrets or variables"

            # Ensure directories exist

            mkdir -p "$(dirname "$LITELLM_CONFIG")"

            # Configuration

            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"

            echo "✅ LITELLM config file written: $LITELLM_CONFIG"

          fi



          # panduanyunxingmoshi

          MODE="${{ github.event.inputs.mode || 'full' }}"



          echo "=========================================="

          echo "🚀 Daily Stock Analysis"

          echo "=========================================="

          echo "⏰ shijian: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

          echo "🎯 yunxingmoshi: $MODE"

          echo "📊 zixuangu: $STOCK_LIST"

          echo "📝 Report type: $REPORT_TYPE"

          echo ""

          echo "=========================================="

          echo "📋 Configuration check"

          echo "=========================================="

          echo "【AI configuration】"

          if [ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] || [ -n "$ANSPIRE_API_KEYS" ]; then

            echo "  LiteLLM: ✅ configured"

          else

            echo "  LiteLLM: ❌ not configured"

          fi

          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ configured' || echo '❌ not configured')"

          echo "  DeepSeek Key:   $([ -n "$DEEPSEEK_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Anspire Key:    $([ -n "$ANSPIRE_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo ""

          echo "【shujuyuan】"

          echo "  Tushare Token: $([ -n "$TUSHARE_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Longbridge: $([ -n "$LONGBRIDGE_APP_KEY" ] && [ -n "$LONGBRIDGE_APP_SECRET" ] && [ -n "$LONGBRIDGE_ACCESS_TOKEN" ] && echo '✅ configured（US/HK market data supplement）' || echo '⚪ not configured（jin YFinance deng，wuzhangqiaodiaoyong）')"

          echo ""

          echo "【sousuoyinqing】"

          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  SerpAPI Keys: $([ -n "$SERPAPI_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  MiniMax API Keys: $([ -n "$MINIMAX_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Brave API Keys: $([ -n "$BRAVE_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  SearXNG Base URLs: $([ -n "$SEARXNG_BASE_URLS" ] && echo '✅ configured' || echo '⚪ not configured')"

          case "${SEARXNG_PUBLIC_INSTANCES_ENABLED,,}" in

            0|false|no|off)

              echo "  SearXNG Public Instances: ❌ yijinyong"

              ;;

            "")

              echo "  SearXNG Public Instances: ✅ enabled by default"

              ;;

            *)

              echo "  SearXNG Public Instances: ✅ yiqiyong"

              ;;

          esac

          echo ""

          echo "【Notification channels】"

          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  ntfy: $([ -n "$NTFY_URL" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Gotify: $([ -n "$GOTIFY_URL" ] && [ -n "$GOTIFY_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  WeCom: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ configured' || echo '⚪ not configured')"

          echo "  Slack: $(([ -n "$SLACK_WEBHOOK_URL" ] || ([ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ])) && echo '✅ configured' || echo '⚪ not configured')"

          echo "=========================================="

          echo ""



          # goujianminglingxingcanshu

          FORCE_RUN_ARG=""

          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then

            FORCE_RUN_ARG="--force-run"

            echo "⚡ yiqiyongqiangzhiyunxingmoshi（tiaoguojiaoyirijiancha）"

          fi



          # Run analysis

          if [ "$MODE" = "market-only" ]; then

            python main.py --market-review $FORCE_RUN_ARG

          elif [ "$MODE" = "stocks-only" ]; then

            python main.py --no-market-review $FORCE_RUN_ARG

          else

            python main.py $FORCE_RUN_ARG

          fi



      - name: Upload analysis reports

        uses: actions/upload-artifact@v6

        if: always()

        with:

          name: analysis-reports-${{ github.run_number }}

          path: |

            reports/

            logs/

          retention-days: 30



      - name: Show run result

        if: always()

        run: |

          echo ""

          echo "=========================================="

          echo "📊 Analysis completed"

          echo "=========================================="

          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then

            echo "Generated reports:"

            ls -la reports/

          else

            echo "⚠️ No report files were generated"

          fi

          echo ""

          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then

            echo "📜 zuijinrizhi（zuihou 30 xing）:"

            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "wurizhi"

          fi
