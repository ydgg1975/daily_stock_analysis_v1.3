name: Daily Stock Analysis



on:

  # dingshichufa - meitianbeijingshijian 18:00 (UTC 10:00)

  schedule:

    - cron: '0 10 * * 1-5'     # zhouyidaozhouwu，UTC 10:00 = beijingshijian 18:00



  # shoudongchufa

  workflow_dispatch:

    inputs:

      mode:

        description: 'yunxingmoshi'

        required: true

        default: 'full'

        type: choice

        options:

          - full          # full analysis (stocks and market)

          - market-only   # jindapanfupan

          - stocks-only   # stock analysis only

      force_run:

        description: 'qiangzhiyunxing（tiaoguojiaoyirijiancha）'

        required: false

        default: false

        type: boolean



# Configuration

concurrency:

  group: stock-analysis

  cancel-in-progress: false



jobs:

  analyze:

    runs-on: ubuntu-latest

    # Configuration

    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}



    steps:

      - name: Random delay

        run: sleep $((RANDOM % 60))  # delay startup by 0-60 seconds



      - name: Check out code

        uses: actions/checkout@v5



      - name: Set up Python

        uses: actions/setup-python@v6

        with:

          python-version: '3.11'

          cache: 'pip'



      - name: Install dependencies

        run: |

          pip install --upgrade pip

          pip install -r requirements.txt



      - name: Create required directories

        run: |

          mkdir -p data logs reports



      - name: Run stock analysis

        env:

          # ==========================================

          # AI configuration

          # ==========================================

          # LITELLM_CONFIG

          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}

          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}

          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}

